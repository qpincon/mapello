<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 96" fill="none">
  <!-- Main M silhouette outline -->
  <path d="M 8,80 L 12,22 L 38,14 L 60,60 L 82,14 L 108,22 L 112,80 Z"
    stroke="#0f172a" stroke-width="4" stroke-linejoin="round" fill="white"/>

  <!-- Outer fold crease lines -->
  <line x1="12" y1="22" x2="14" y2="80" stroke="#0f172a" stroke-width="2.5" stroke-opacity="0.45"/>
  <line x1="108" y1="22" x2="106" y2="80" stroke="#0f172a" stroke-width="2.5" stroke-opacity="0.45"/>

  <!-- Inner fold crease lines -->
  <line x1="38" y1="14" x2="36" y2="80" stroke="#0f172a" stroke-width="2.8"/>
  <line x1="60" y1="60" x2="60" y2="80" stroke="#0f172a" stroke-width="2.8"/>
  <line x1="82" y1="14" x2="84" y2="80" stroke="#0f172a" stroke-width="2.8"/>

  <!-- Corner accent triangle (teal) -->
  <polygon points="107,73 116,84 100,84" fill="#2a7d6e" stroke="#2a7d6e" stroke-width="1.5" stroke-linejoin="round"/>
</svg>
